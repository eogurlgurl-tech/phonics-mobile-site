<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4~5세 파닉스 1년 학습 플랜</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fff7ed 0%, #ffffff 45%, #eff6ff 100%);
      color: #0f172a;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 92px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e5e7eb;
      padding: 18px 18px 14px;
    }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .eyebrow { margin: 0; color: #d97706; font-size: 12px; font-weight: 800; }
    h1 { margin: 4px 0 0; font-size: 22px; letter-spacing: -0.5px; }
    .spark { width: 48px; height: 48px; border-radius: 18px; background: #fef3c7; display: grid; place-items: center; font-size: 26px; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
    .summary-card { border-radius: 18px; background: white; padding: 12px; box-shadow: 0 6px 18px rgba(15,23,42,0.07); }
    .summary-card.dark { background: #0f172a; color: white; }
    .summary-card p { margin: 0; font-size: 11px; color: #64748b; font-weight: 700; }
    .summary-card.dark p { color: #cbd5e1; }
    .summary-card strong { display: block; margin-top: 4px; font-size: 18px; }
    main { padding: 18px; }
    .page { display: none; animation: fade 0.22s ease; }
    .page.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .hero { overflow: hidden; border-radius: 30px; background: white; box-shadow: 0 12px 30px rgba(15,23,42,0.1); }
    .hero-head { padding: 22px; background: linear-gradient(135deg, #fcd34d, #fed7aa); }
    .hero-line { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .phase { color: #92400e; font-size: 12px; font-weight: 900; margin: 0; }
    h2 { margin: 6px 0 0; font-size: 25px; letter-spacing: -0.6px; }
    .emoji { font-size: 52px; }
    .detail { margin: 12px 0 0; color: #7c2d12; font-size: 14px; font-weight: 700; line-height: 1.45; }
    .hero-body { padding: 18px; }
    .sound-box { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-radius: 22px; padding: 16px; }
    .sound-letter { font-size: 54px; font-weight: 950; }
    .sound-right { text-align: right; }
    .sound-right strong { font-size: 19px; }
    .sound-right p { margin: 4px 0 0; color: #64748b; font-size: 13px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .chip { background: #e0f2fe; color: #075985; padding: 8px 12px; border-radius: 999px; font-weight: 900; font-size: 13px; }
    .section-title { display: flex; align-items: center; gap: 8px; margin: 22px 0 10px; font-size: 17px; font-weight: 950; }
    .routine-card, .week-card, .phase-card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 10px; box-shadow: 0 7px 18px rgba(15,23,42,0.06); }
    .routine-card { display: flex; gap: 12px; }
    .routine-icon { width: 42px; height: 42px; border-radius: 16px; background: #f1f5f9; display: grid; place-items: center; flex-shrink: 0; font-size: 21px; }
    .routine-main { flex: 1; }
    .routine-top { display: flex; justify-content: space-between; gap: 8px; }
    .routine-top strong { font-size: 15px; }
    .minute { color: #b45309; font-size: 12px; font-weight: 900; white-space: nowrap; }
    .desc { margin: 5px 0 0; color: #475569; font-size: 13px; line-height: 1.45; }
    .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
    button { border: 0; cursor: pointer; font-family: inherit; }
    .btn { height: 48px; border-radius: 18px; font-weight: 950; background: white; color: #0f172a; border: 1px solid #e2e8f0; }
    .btn.primary { background: #0f172a; color: white; border: 0; }
    .btn.done { background: #059669; color: white; border: 0; }
    .btn:disabled { opacity: 0.35; }
    .week-card { text-align: left; width: 100%; }
    .week-card.active { background: #0f172a; color: white; }
    .week-card p { margin: 6px 0 0; color: #64748b; font-size: 13px; line-height: 1.4; }
    .week-card.active p { color: #cbd5e1; }
    .phase-card small { color: #64748b; font-weight: 800; }
    .phase-card h3 { margin: 5px 0; }
    .phase-card p { margin: 4px 0; color: #475569; font-size: 13px; line-height: 1.45; }
    .notice { background: #e0f2fe; border-radius: 26px; padding: 18px; color: #0f172a; font-size: 14px; line-height: 1.55; }
    .search-box { position: relative; margin-bottom: 12px; }
    .search-box input { width: 100%; height: 48px; border-radius: 18px; border: 1px solid #e2e8f0; padding: 0 14px 0 42px; outline: none; font-size: 14px; }
    .search-box span { position: absolute; left: 15px; top: 12px; color: #94a3b8; }
    .search-list { max-height: 62vh; overflow-y: auto; padding-right: 4px; }
    nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(255,255,255,0.94); backdrop-filter: blur(12px); border-top: 1px solid #e5e7eb; padding: 10px 12px 14px; }
    .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .nav-btn { border-radius: 18px; padding: 9px 4px; background: transparent; color: #64748b; font-weight: 900; font-size: 12px; }
    .nav-btn.active { background: #0f172a; color: white; }
    .nav-btn span { display: block; font-size: 20px; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="top">
        <div>
          <p class="eyebrow">4~5세 전용 · 하루 15~20분</p>
          <h1>1년 파닉스 놀이 플랜</h1>
        </div>
        <div class="spark">✨</div>
      </div>
      <div class="summary">
        <div class="summary-card dark"><p>오늘</p><strong id="summaryDay">Day 1</strong></div>
        <div class="summary-card"><p>주차</p><strong id="summaryWeek">1주차</strong></div>
        <div class="summary-card"><p>완료</p><strong id="summaryProgress">0%</strong></div>
      </div>
    </header>

    <main>
      <section id="todayPage" class="page active">
        <div class="hero">
          <div class="hero-head">
            <div class="hero-line">
              <div>
                <p class="phase" id="todayPhase">소리 친해지기</p>
                <h2 id="todayMain">소리 듣고 따라하기</h2>
              </div>
              <div class="emoji" id="todayEmoji">☀️</div>
            </div>
            <p class="detail" id="todayDetail">s /s/ / sun</p>
          </div>
          <div class="hero-body">
            <div class="sound-box">
              <div>
                <p class="desc">오늘의 소리</p>
                <div class="sound-letter" id="todayLetter">s</div>
              </div>
              <div class="sound-right">
                <strong id="todaySound">/s/</strong>
                <p id="todayWord">sun · 해</p>
              </div>
            </div>
            <div class="chips" id="wordChips"></div>
          </div>
        </div>

        <div class="section-title">⏱ 오늘 진행 순서</div>
        <div id="routineList"></div>

        <div class="controls">
          <button class="btn" id="prevBtn">‹ 이전</button>
          <button class="btn primary" id="doneBtn">✓ 체크</button>
          <button class="btn" id="nextBtn">다음 ›</button>
        </div>
      </section>

      <section id="weekPage" class="page">
        <div class="phase-card">
          <small id="weekLabel">Week 1</small>
          <h3 id="weekTitle">소리 친해지기</h3>
          <p id="weekGoal">목표</p>
          <p id="weekFocus">중점</p>
        </div>
        <div id="weekList"></div>
      </section>

      <section id="yearPage" class="page">
        <div id="phaseList"></div>
        <div class="notice"><strong>운영 기준</strong><br/>하루 15~20분, 주 6일 학습 + 1일 놀이 복습 기준입니다. 4~5세는 정확도보다 반복 노출과 자신감이 우선입니다. 오래 붙잡으면 영어보다 부모님 표정부터 싫어합니다. 이건 과학이라기보다 육아 현장의 참혹한 진실입니다.</div>
      </section>

      <section id="searchPage" class="page">
        <div class="search-box">
          <span>🔎</span>
          <input id="searchInput" placeholder="day, week, cat, sight word 검색" />
        </div>
        <div class="search-list" id="searchList"></div>
      </section>
    </main>

    <nav>
      <div class="nav-grid">
        <button class="nav-btn active" data-tab="today"><span>🏠</span>오늘</button>
        <button class="nav-btn" data-tab="week"><span>📅</span>주간</button>
        <button class="nav-btn" data-tab="year"><span>🔁</span>1년</button>
        <button class="nav-btn" data-tab="search"><span>🔎</span>검색</button>
      </div>
    </nav>
  </div>

  <script>
    const LETTERS = [
      { l: "s", sound: "/s/", word: "sun", ko: "해", emoji: "☀️" },
      { l: "a", sound: "/æ/", word: "apple", ko: "사과", emoji: "🍎" },
      { l: "t", sound: "/t/", word: "tap", ko: "톡톡", emoji: "🚰" },
      { l: "p", sound: "/p/", word: "pig", ko: "돼지", emoji: "🐷" },
      { l: "i", sound: "/ɪ/", word: "igloo", ko: "이글루", emoji: "🏠" },
      { l: "n", sound: "/n/", word: "net", ko: "그물", emoji: "🕸️" },
      { l: "m", sound: "/m/", word: "map", ko: "지도", emoji: "🗺️" },
      { l: "d", sound: "/d/", word: "dog", ko: "강아지", emoji: "🐶" },
      { l: "g", sound: "/g/", word: "goat", ko: "염소", emoji: "🐐" },
      { l: "o", sound: "/ɒ/", word: "octopus", ko: "문어", emoji: "🐙" },
      { l: "c", sound: "/k/", word: "cat", ko: "고양이", emoji: "🐱" },
      { l: "k", sound: "/k/", word: "kite", ko: "연", emoji: "🪁" },
      { l: "e", sound: "/e/", word: "egg", ko: "달걀", emoji: "🥚" },
      { l: "u", sound: "/ʌ/", word: "umbrella", ko: "우산", emoji: "☂️" },
      { l: "r", sound: "/r/", word: "rabbit", ko: "토끼", emoji: "🐰" },
      { l: "h", sound: "/h/", word: "hat", ko: "모자", emoji: "🎩" },
      { l: "b", sound: "/b/", word: "bat", ko: "박쥐", emoji: "🦇" },
      { l: "f", sound: "/f/", word: "fish", ko: "물고기", emoji: "🐟" },
      { l: "l", sound: "/l/", word: "lion", ko: "사자", emoji: "🦁" },
      { l: "j", sound: "/dʒ/", word: "jam", ko: "잼", emoji: "🍓" },
      { l: "v", sound: "/v/", word: "van", ko: "밴", emoji: "🚐" },
      { l: "w", sound: "/w/", word: "web", ko: "거미줄", emoji: "🕸️" },
      { l: "x", sound: "/ks/", word: "box", ko: "상자", emoji: "📦" },
      { l: "y", sound: "/j/", word: "yo-yo", ko: "요요", emoji: "🪀" },
      { l: "z", sound: "/z/", word: "zip", ko: "지퍼", emoji: "🤐" },
      { l: "q", sound: "/kw/", word: "queen", ko: "여왕", emoji: "👑" }
    ];
    const WORD_FAMILIES = {
      at: ["cat", "bat", "hat", "mat", "sat"], an: ["can", "pan", "fan", "man", "van"], ap: ["cap", "map", "tap", "nap", "lap"],
      in: ["pin", "tin", "fin", "win", "bin"], it: ["sit", "pit", "fit", "hit", "kit"], ip: ["lip", "sip", "zip", "tip", "rip"],
      ot: ["hot", "pot", "dot", "cot", "lot"], op: ["hop", "top", "pop", "mop", "cop"], og: ["dog", "log", "fog", "hog"],
      ug: ["bug", "mug", "rug", "hug"], un: ["sun", "run", "fun", "bun"], et: ["pet", "net", "jet", "wet"]
    };
    const SIGHT_WORDS = ["I", "a", "the", "my", "see", "go", "to", "we", "me", "like", "is", "it", "can", "you", "and", "up", "in", "on", "look", "here"];
    const PHASES = [
      { weeks: [1, 4], title: "소리 친해지기", goal: "알파벳 이름보다 소리 인식", focus: "듣기·따라 말하기·입모양" },
      { weeks: [5, 12], title: "기본 자음·단모음", goal: "문자와 대표 소리 연결", focus: "하루 2~3개 소리 반복" },
      { weeks: [13, 24], title: "CVC 블렌딩", goal: "cat, map, pin 형태 읽기", focus: "소리 붙여 읽기" },
      { weeks: [25, 36], title: "Word Family", goal: "at/an/ap 등 패턴 읽기", focus: "비슷한 단어 묶음" },
      { weeks: [37, 44], title: "Sight Word 병행", goal: "the, I, see 등 자주 보는 단어", focus: "짧은 문장 읽기" },
      { weeks: [45, 52], title: "리딩 루틴", goal: "짧은 문장과 그림책 연결", focus: "자신감·반복·놀이" }
    ];

    let currentDay = Number(localStorage.getItem("phonicsCurrentDay") || 1);
    let done = JSON.parse(localStorage.getItem("phonicsDone") || "{}");
    const $ = (id) => document.getElementById(id);

    function getPhase(week) { return PHASES.find(p => week >= p.weeks[0] && week <= p.weeks[1]) || PHASES[0]; }
    function buildYearPlan() {
      return Array.from({ length: 365 }, (_, idx) => {
        const day = idx + 1;
        const week = Math.ceil(day / 7);
        const dayInWeek = ((day - 1) % 7) + 1;
        const phase = getPhase(week);
        const letter = LETTERS[(week + dayInWeek - 2) % LETTERS.length];
        const reviewLetter = LETTERS[(week + dayInWeek + 4) % LETTERS.length];
        const families = Object.keys(WORD_FAMILIES);
        const familyKey = families[(week + dayInWeek - 1) % families.length];
        const sight = SIGHT_WORDS[(week + dayInWeek - 2) % SIGHT_WORDS.length];
        let main = "소리 듣고 따라하기";
        let detail = `${letter.l} ${letter.sound} / ${letter.word}`;
        let miniWords = [letter.word, reviewLetter.word];
        if (week >= 13 && week <= 24) { main = "CVC 소리 붙여 읽기"; detail = `${familyKey} 패턴: ${WORD_FAMILIES[familyKey].slice(0, 3).join(", ")}`; miniWords = WORD_FAMILIES[familyKey].slice(0, 4); }
        if (week >= 25 && week <= 36) { main = "Word Family 반복 읽기"; detail = `${familyKey} family 단어 찾기 놀이`; miniWords = WORD_FAMILIES[familyKey]; }
        if (week >= 37) { main = "짧은 문장 읽기"; detail = `Sight word: ${sight} / 문장: I see a ${letter.word}.`; miniWords = [sight, "I", "see", "a", letter.word]; }
        if (dayInWeek === 6) { main = "주간 복습"; detail = "이번 주 소리·단어를 카드처럼 다시 보기"; }
        if (dayInWeek === 7) { main = "놀이 학습"; detail = "노래, 그림책, 단어 찾기 중 1개 선택"; }
        return {
          day, week, dayInWeek, phase, letter, reviewLetter, familyKey, sight, main, detail, miniWords,
          routine: [
            { min: "3분", icon: "🎵", title: "소리 워밍업", desc: `${letter.l} 소리 듣고 5회 따라하기` },
            { min: "5분", icon: "▶️", title: main, desc: detail },
            { min: "5분", icon: "✏️", title: "손·입 연결", desc: "손가락으로 글자 따라 쓰고 소리 말하기" },
            { min: "3~7분", icon: "⭐", title: "칭찬 마무리", desc: "맞힌 개수보다 시도한 횟수 칭찬하기" }
          ]
        };
      });
    }
    const PLAN = buildYearPlan();

    function save() {
      localStorage.setItem("phonicsCurrentDay", String(currentDay));
      localStorage.setItem("phonicsDone", JSON.stringify(done));
    }
    function render() {
      const today = PLAN[currentDay - 1];
      const progress = Math.round((Object.keys(done).filter(k => done[k]).length / 365) * 100);
      $("summaryDay").textContent = `Day ${today.day}`;
      $("summaryWeek").textContent = `${today.week}주차`;
      $("summaryProgress").textContent = `${progress}%`;
      $("todayPhase").textContent = today.phase.title;
      $("todayMain").textContent = today.main;
      $("todayEmoji").textContent = today.letter.emoji;
      $("todayDetail").textContent = today.detail;
      $("todayLetter").textContent = today.letter.l;
      $("todaySound").textContent = today.letter.sound;
      $("todayWord").textContent = `${today.letter.word} · ${today.letter.ko}`;
      $("wordChips").innerHTML = today.miniWords.map(w => `<span class="chip">${w}</span>`).join("");
      $("routineList").innerHTML = today.routine.map(r => `<div class="routine-card"><div class="routine-icon">${r.icon}</div><div class="routine-main"><div class="routine-top"><strong>${r.title}</strong><span class="minute">${r.min}</span></div><p class="desc">${r.desc}</p></div></div>`).join("");
      $("prevBtn").disabled = currentDay === 1;
      $("nextBtn").disabled = currentDay === 365;
      $("doneBtn").className = done[currentDay] ? "btn done" : "btn primary";
      $("doneBtn").textContent = done[currentDay] ? "✓ 완료" : "✓ 체크";
      renderWeek();
      renderSearch();
      save();
    }
    function renderWeek() {
      const today = PLAN[currentDay - 1];
      $("weekLabel").textContent = `Week ${today.week}`;
      $("weekTitle").textContent = today.phase.title;
      $("weekGoal").textContent = `목표: ${today.phase.goal}`;
      $("weekFocus").textContent = `중점: ${today.phase.focus}`;
      const weekly = PLAN.filter(d => d.week === today.week);
      $("weekList").innerHTML = weekly.map(d => `<button class="week-card ${d.day === currentDay ? "active" : ""}" onclick="goDay(${d.day}); openTab('today')"><strong>Day ${d.day} · ${d.main} ${done[d.day] ? "✓" : ""}</strong><p>${d.detail}</p></button>`).join("");
    }
    function renderYear() {
      $("phaseList").innerHTML = PHASES.map((p, i) => `<div class="phase-card"><small>${p.weeks[0]}~${p.weeks[1]}주차</small><h3>${i + 1}. ${p.title}</h3><p>목표: ${p.goal}</p><p>중점: ${p.focus}</p></div>`).join("");
    }
    function renderSearch() {
      const q = ($("searchInput")?.value || "").toLowerCase();
      const filtered = PLAN.filter(d => `${d.day} ${d.week} ${d.main} ${d.detail} ${d.phase.title}`.toLowerCase().includes(q)).slice(0, 80);
      $("searchList").innerHTML = filtered.map(d => `<button class="week-card" onclick="goDay(${d.day}); openTab('today')"><strong>Day ${d.day} · Week ${d.week} ${d.letter.emoji}</strong><p>${d.main} · ${d.detail}</p></button>`).join("");
    }
    function goDay(day) { currentDay = Math.max(1, Math.min(365, day)); render(); }
    function openTab(tab) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      $(`${tab}Page`).classList.add("active");
      document.querySelector(`[data-tab="${tab}"]`).classList.add("active");
      if (tab === "year") renderYear();
      if (tab === "search") renderSearch();
    }
    $("prevBtn").onclick = () => goDay(currentDay - 1);
    $("nextBtn").onclick = () => goDay(currentDay + 1);
    $("doneBtn").onclick = () => { done[currentDay] = !done[currentDay]; render(); };
    $("searchInput").oninput = renderSearch;
    document.querySelectorAll(".nav-btn").forEach(btn => btn.onclick = () => openTab(btn.dataset.tab));
    renderYear();
    render();
  </script>
</body>
</html>
