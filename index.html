<!-- FILE: index.html -->
<!-- VERSION: v2.0 FULL -->
<!-- PURPOSE: 4~5세 파닉스 모바일 웹앱 / 음성 / 따라쓰기 / 음성인식 포함 -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>4~5세 파닉스 1년 학습 플랜</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#fff7ed 0%,#fff 45%,#eff6ff 100%);
  color:#0f172a;
}

.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:100px;
}

header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #e5e7eb;
  padding:18px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  margin:6px 0 0;
  font-size:24px;
}

.eyebrow{
  font-size:12px;
  color:#d97706;
  font-weight:900;
}

.spark{
  width:52px;
  height:52px;
  border-radius:18px;
  background:#fef3c7;
  display:grid;
  place-items:center;
  font-size:28px;
}

.summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:16px;
}

.summary-card{
  background:white;
  border-radius:18px;
  padding:12px;
  box-shadow:0 6px 16px rgba(15,23,42,.07);
}

.summary-card.dark{
  background:#0f172a;
  color:white;
}

.summary-card p{
  margin:0;
  font-size:11px;
  font-weight:800;
  color:#64748b;
}

.summary-card.dark p{
  color:#cbd5e1;
}

.summary-card strong{
  display:block;
  margin-top:5px;
  font-size:19px;
}

main{
  padding:18px;
}

.hero{
  overflow:hidden;
  border-radius:30px;
  background:white;
  box-shadow:0 12px 30px rgba(15,23,42,.1);
}

.hero-head{
  padding:22px;
  background:linear-gradient(135deg,#fcd34d,#fed7aa);
}

.hero-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.phase{
  font-size:12px;
  color:#92400e;
  font-weight:900;
}

.hero-title{
  margin-top:5px;
  font-size:30px;
  font-weight:900;
}

.hero-detail{
  margin-top:12px;
  color:#7c2d12;
  font-weight:700;
}

.hero-body{
  padding:18px;
}

.sound-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f8fafc;
  border-radius:22px;
  padding:18px;
}

.sound-letter{
  font-size:60px;
  font-weight:900;
}

.sound-right{
  text-align:right;
}

.sound-right strong{
  font-size:24px;
}

.sound-right p{
  margin-top:5px;
  color:#64748b;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

.chip{
  background:#e0f2fe;
  color:#075985;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.section-title{
  margin:26px 0 10px;
  font-size:18px;
  font-weight:900;
}

.card{
  background:white;
  border-radius:24px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 7px 18px rgba(15,23,42,.06);
}

.practice-grid,
.controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}

button{
  border:0;
  cursor:pointer;
  font-family:inherit;
}

.btn{
  min-height:48px;
  border-radius:18px;
  font-weight:900;
  padding:10px;
}

.btn-dark{
  background:#0f172a;
  color:white;
}

.btn-orange{
  background:#f97316;
  color:white;
}

.btn-sky{
  background:#0284c7;
  color:white;
}

.btn-pink{
  background:#db2777;
  color:white;
}

.btn-light{
  background:white;
  border:1px solid #e2e8f0;
}

.result{
  margin-top:12px;
  background:#f8fafc;
  border-radius:18px;
  padding:14px;
  line-height:1.5;
  font-size:14px;
}

canvas{
  width:100%;
  height:220px;
  background:white;
  border-radius:22px;
  border:2px dashed #cbd5e1;
  touch-action:none;
}

nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  border-top:1px solid #e5e7eb;
  padding:10px;
}

.nav-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.nav-btn{
  border-radius:18px;
  background:transparent;
  padding:10px 6px;
  color:#64748b;
  font-size:12px;
  font-weight:900;
}

.nav-btn.active{
  background:#0f172a;
  color:white;
}

.nav-btn span{
  display:block;
  font-size:22px;
  margin-bottom:3px;
}
</style>
</head>

<body>

<div class="app">

<header>

<div class="top">
<div>
<div class="eyebrow">4~5세 전용 · 하루 15~20분</div>
<h1>1년 파닉스 놀이 플랜</h1>
</div>

<div class="spark">✨</div>
</div>

<div class="summary">

<div class="summary-card dark">
<p>오늘</p>
<strong id="summaryDay">Day 1</strong>
</div>

<div class="summary-card">
<p>주차</p>
<strong id="summaryWeek">1주차</strong>
</div>

<div class="summary-card">
<p>완료</p>
<strong id="summaryProgress">0%</strong>
</div>

</div>
</header>

<main>

<div class="hero">

<div class="hero-head">

<div class="hero-line">
<div>
<div class="phase" id="phaseText">소리 친해지기</div>
<div class="hero-title" id="mainTitle">소리 듣고 따라하기</div>
</div>

<div style="font-size:58px;" id="emoji">☀️</div>
</div>

<div class="hero-detail" id="heroDetail">
s /s/ / sun
</div>

</div>

<div class="hero-body">

<div class="sound-box">

<div>
<div style="font-size:13px;color:#64748b;">오늘의 소리</div>
<div class="sound-letter" id="letterText">s</div>
</div>

<div class="sound-right">
<strong id="soundText">/s/</strong>
<p id="wordText">sun · 해</p>
</div>

</div>

<div class="chips" id="chips"></div>

<div class="practice-grid">

<button class="btn btn-orange" id="soundBtn">
🔊 소리
</button>

<button class="btn btn-sky" id="wordBtn">
🔊 단어
</button>

<button class="btn btn-pink" id="sentenceBtn">
🔊 문장
</button>

</div>

</div>
</div>

<div class="section-title">
🎙 따라 말하기
</div>

<div class="card">

<div>
목표 단어:
<strong id="targetWord">sun</strong>
</div>

<button class="btn btn-dark" style="width:100%;margin-top:12px;" id="speechBtn">
🎤 말하기 시작
</button>

<div class="result" id="speechResult">
버튼을 누르고 아이가 영어 단어를 말하면 인식 결과가 표시됩니다.
</div>

</div>

<div class="section-title">
✏️ 따라 쓰기
</div>

<div class="card">

<div style="margin-bottom:10px;">
손가락으로 따라 써보세요
</div>

<canvas id="canvas"></canvas>

<div class="controls">

<button class="btn btn-light" id="clearBtn">
지우기
</button>

<button class="btn btn-sky" id="guideBtn">
가이드 숨기기
</button>

<button class="btn btn-orange" id="canvasSpeakBtn">
글자 듣기
</button>

</div>

</div>

<div class="section-title">
⏱ 오늘 진행 순서
</div>

<div class="card">
🎵 소리 워밍업 (3분)
</div>

<div class="card">
▶️ 소리 듣고 따라하기 (5분)
</div>

<div class="card">
✏️ 손·입 연결 (5분)
</div>

<div class="card">
⭐ 칭찬 마무리 (3~7분)
</div>

<div class="controls">

<button class="btn btn-light" id="prevBtn">
‹ 이전
</button>

<button class="btn btn-dark" id="doneBtn">
✓ 체크
</button>

<button class="btn btn-light" id="nextBtn">
다음 ›
</button>

</div>

</main>

<nav>

<div class="nav-grid">

<button class="nav-btn active">
<span>🏠</span>
오늘
</button>

<button class="nav-btn">
<span>📅</span>
주간
</button>

<button class="nav-btn">
<span>🔁</span>
1년
</button>

<button class="nav-btn">
<span>🔎</span>
검색
</button>

</div>

</nav>

</div>

<script>

const LETTERS = [
{l:"s",sound:"s",word:"sun",ko:"해",emoji:"☀️"},
{l:"a",sound:"a",word:"apple",ko:"사과",emoji:"🍎"},
{l:"t",sound:"t",word:"tap",ko:"수도",emoji:"🚰"},
{l:"p",sound:"p",word:"pig",ko:"돼지",emoji:"🐷"},
{l:"m",sound:"m",word:"map",ko:"지도",emoji:"🗺️"},
{l:"c",sound:"k",word:"cat",ko:"고양이",emoji:"🐱"},
{l:"d",sound:"d",word:"dog",ko:"강아지",emoji:"🐶"},
{l:"b",sound:"b",word:"bat",ko:"박쥐",emoji:"🦇"}
];

let current = Number(localStorage.getItem("phonics_day") || 0);
let done = JSON.parse(localStorage.getItem("phonics_done") || "{}");

function render(){

const data = LETTERS[current % LETTERS.length];

document.getElementById("summaryDay").innerText = `Day ${current+1}`;
document.getElementById("summaryWeek").innerText = `${Math.ceil((current+1)/7)}주차`;

const progress = Math.round(
(Object.keys(done).length / 365) * 100
);

document.getElementById("summaryProgress").innerText = `${progress}%`;

document.getElementById("phaseText").innerText = "소리 친해지기";
document.getElementById("mainTitle").innerText = "소리 듣고 따라하기";
document.getElementById("emoji").innerText = data.emoji;
document.getElementById("heroDetail").innerText =
`${data.l} /${data.sound}/ / ${data.word}`;

document.getElementById("letterText").innerText = data.l;
document.getElementById("soundText").innerText = `/${data.sound}/`;
document.getElementById("wordText").innerText =
`${data.word} · ${data.ko}`;

document.getElementById("targetWord").innerText =
data.word;

document.getElementById("chips").innerHTML =
`
<div class="chip">${data.word}</div>
<div class="chip">${data.l}</div>
`;

}

function speak(text){

if(!window.speechSynthesis){
alert("음성 기능 미지원");
return;
}

speechSynthesis.cancel();

const utter = new SpeechSynthesisUtterance(text);

utter.lang = "en-US";
utter.rate = 0.7;
utter.pitch = 1.1;

speechSynthesis.speak(utter);

}

document.getElementById("soundBtn").onclick = () => {

const data = LETTERS[current % LETTERS.length];
speak(data.sound);

};

document.getElementById("wordBtn").onclick = () => {

const data = LETTERS[current % LETTERS.length];
speak(data.word);

};

document.getElementById("sentenceBtn").onclick = () => {

const data = LETTERS[current % LETTERS.length];
speak(`I see a ${data.word}`);

};

document.getElementById("canvasSpeakBtn").onclick = () => {

const data = LETTERS[current % LETTERS.length];
speak(data.sound);

};

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

document.getElementById("speechBtn").onclick = () => {

if(!SpeechRecognition){

document.getElementById("speechResult").innerHTML =
"현재 브라우저는 음성인식을 지원하지 않습니다.";

return;
}

const recognition = new SpeechRecognition();

recognition.lang = "en-US";
recognition.interimResults = false;

document.getElementById("speechResult").innerHTML =
"듣는 중입니다...";

recognition.onresult = (event) => {

const result =
event.results[0][0].transcript;

document.getElementById("speechResult").innerHTML =
`
인식 결과:
<b>${result}</b>
`;

};

recognition.onerror = () => {

document.getElementById("speechResult").innerHTML =
"음성 인식 실패";

};

recognition.start();

};

document.getElementById("prevBtn").onclick = () => {

if(current > 0){

current--;
save();
render();

}

};

document.getElementById("nextBtn").onclick = () => {

current++;
save();
render();

};

document.getElementById("doneBtn").onclick = () => {

done[current] = true;

save();

document.getElementById("doneBtn").innerText =
"✓ 완료";

};

function save(){

localStorage.setItem(
"phonics_day",
current
);

localStorage.setItem(
"phonics_done",
JSON.stringify(done)
);

}

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

function resizeCanvas(){

canvas.width = canvas.offsetWidth;
canvas.height = 220;

drawGuide();

}

window.addEventListener(
"resize",
resizeCanvas
);

let drawing = false;

function drawGuide(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.globalAlpha = 0.15;

ctx.font = "140px sans-serif";

ctx.textAlign = "center";

ctx.fillText(
LETTERS[current % LETTERS.length].l,
canvas.width/2,
150
);

ctx.globalAlpha = 1;

}

canvas.addEventListener(
"mousedown",
startDraw
);

canvas.addEventListener(
"mousemove",
draw
);

canvas.addEventListener(
"mouseup",
stopDraw
);

canvas.addEventListener(
"touchstart",
startDraw
);

canvas.addEventListener(
"touchmove",
draw
);

canvas.addEventListener(
"touchend",
stopDraw
);

function getPos(e){

const rect =
canvas.getBoundingClientRect();

if(e.touches){

return {
x:e.touches[0].clientX - rect.left,
y:e.touches[0].clientY - rect.top
};

}

return {
x:e.clientX - rect.left,
y:e.clientY - rect.top
};

}

function startDraw(e){

drawing = true;

const pos = getPos(e);

ctx.beginPath();

ctx.moveTo(pos.x,pos.y);

}

function draw(e){

if(!drawing) return;

e.preventDefault();

const pos = getPos(e);

ctx.lineWidth = 8;
ctx.lineCap = "round";

ctx.lineTo(pos.x,pos.y);

ctx.stroke();

}

function stopDraw(){

drawing = false;

}

document.getElementById("clearBtn").onclick = () => {

drawGuide();

};

let guideVisible = true;

document.getElementById("guideBtn").onclick = () => {

guideVisible = !guideVisible;

if(guideVisible){

drawGuide();

document.getElementById("guideBtn").innerText =
"가이드 숨기기";

}else{

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

document.getElementById("guideBtn").innerText =
"가이드 보기";

}

};

resizeCanvas();
render();

</script>

</body>
</html>
